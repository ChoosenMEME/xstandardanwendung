name: Django Docker CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  docker-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Create CI env file
        run: cp .env.example .env

      # Gegen die Dev-Compose getestet: sie baut lokal und enthaelt die Tests.
      # Das veroeffentlichte Release-Image bleibt schlank und testfrei.
      - name: Validate Docker Compose file
        run: docker compose -f compose.dev.yaml config --quiet

      - name: Build Docker images
        run: docker compose -f compose.dev.yaml build

      - name: Start Docker Compose stack
        run: docker compose -f compose.dev.yaml up -d --wait --wait-timeout 120

      - name: Run Django system check
        run: docker compose -f compose.dev.yaml exec -T web python manage.py check

      - name: Run Django tests
        run: docker compose -f compose.dev.yaml exec -T web python manage.py test

      - name: Test HTTP response
        run: |
          WEB_PORT="$(grep -E '^WEB_PORT=' .env | cut -d= -f2-)"
          APP_PATH="$(grep -E '^APP_PATH=' .env | cut -d= -f2-)"
          WEB_PORT="${WEB_PORT:-8000}"
          APP_PATH="${APP_PATH#/}"
          APP_PATH="${APP_PATH%/}"

          if [ -n "$APP_PATH" ]; then
            HEALTH_URL="http://localhost:${WEB_PORT}/${APP_PATH}/healthz/"
          else
            HEALTH_URL="http://localhost:${WEB_PORT}/healthz/"
          fi

          curl --fail --silent --show-error "$HEALTH_URL"

      - name: Show logs on failure
        if: failure()
        run: docker compose -f compose.dev.yaml logs --no-color

      - name: Cleanup
        if: always()
        run: docker compose -f compose.dev.yaml down
