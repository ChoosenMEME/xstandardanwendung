services:
  web:
    container_name: xstandardanwendung-dev
    build:
      context: .
    image: choosenmeme/xstandardanwendung:dev
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:${WEB_PORT:-8000}"
    environment:
      DEBUG: ${DEBUG:-1}
      # Devserver mit Auto-Reload statt gunicorn (Quellcode ist als Volume gemountet).
      USE_DEV_SERVER: "1"
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost 127.0.0.1 [::1]}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      WEB_HOST: ${WEB_HOST:-0.0.0.0}
      WEB_PORT: ${WEB_PORT:-8000}
      APP_PATH: ${APP_PATH:-}
      LANGUAGE_CODE: ${LANGUAGE_CODE:-de-de}
      TZ: ${TZ:-Europe/Berlin}
      SQLITE_PATH: ${SQLITE_PATH:-/app/dev.db.sqlite3}
      AI_ASSISTANT_ENABLED: ${AI_ASSISTANT_ENABLED:-false}
      AI_ASSISTANT_PROVIDER: ${AI_ASSISTANT_PROVIDER:-disabled}
      AI_ASSISTANT_MODEL: ${AI_ASSISTANT_MODEL:-}
      AI_ASSISTANT_BASE_URL: ${AI_ASSISTANT_BASE_URL:-}
      AI_ASSISTANT_TIMEOUT_SECONDS: ${AI_ASSISTANT_TIMEOUT_SECONDS:-10}
      EMAIL_HOST: ${EMAIL_HOST:-localhost}
      EMAIL_PORT: ${EMAIL_PORT:-25}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-0}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-webmaster@localhost}
    volumes:
      # Quellcode live in Container spiegeln (inkl. Dev-DB + Tests).
      - ./app:/app
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os, urllib.request; p=os.environ.get('WEB_PORT','8000'); a=os.environ.get('APP_PATH','').strip('/'); h=f'/{a}/healthz/' if a else '/healthz/'; urllib.request.urlopen(f'http://127.0.0.1:{p}{h}', timeout=5)"
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s
