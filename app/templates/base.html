{% load static i18n %}
<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>{% block title %}Gewerbesteuer-Assistent{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/@kern-ux/native@2.6.2/dist/kern.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/@kern-ux/native@2.6.2/dist/fonts/fira-sans.css" rel="stylesheet"/>
    <link href="{% static 'xgewerbesteuer/app.css' %}" rel="stylesheet"/>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% include "partials/header.html" %}

    <main class="main-content" aria-label="{% trans 'Hauptinhalt' %}">
        <div class="container {% block container_class %}{% endblock %}">
            {% block messages %}{% endblock %}
            {% block content %}{% endblock %}
        </div>
    </main>

    {% include "partials/footer.html" %}

    <script>
    (function() {
        var toggle = document.querySelector('.nav-toggle');
        var menu = document.querySelector('.nav-menu');
        if (toggle && menu) {
            toggle.addEventListener('click', function() {
                var expanded = toggle.getAttribute('aria-expanded') === 'true';
                toggle.setAttribute('aria-expanded', String(!expanded));
                menu.classList.toggle('nav-menu--open');
            });
        }

        document.querySelectorAll('[data-password-toggle]').forEach(function(button) {
            button.addEventListener('click', function() {
                var wrapper = button.closest('.form-password-wrapper');
                var input = wrapper ? wrapper.querySelector('[data-password-input]') : null;
                if (!input) return;
                var showing = input.type === 'text';
                input.type = showing ? 'password' : 'text';
                button.textContent = showing
                    ? '{% trans "Anzeigen" %}'
                    : '{% trans "Verbergen" %}';
                button.setAttribute('aria-pressed', String(!showing));
            });
        });
    })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
