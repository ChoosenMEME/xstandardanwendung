services:
  web:
    container_name: xstandardanwendung
    build:
      context: .
    ports:
      - "${WEB_PORT:-8000}:${WEB_PORT:-8000}"
    environment:
      DEBUG: ${DEBUG:-1}
      SECRET_KEY: ${SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      WEB_HOST: ${WEB_HOST:-0.0.0.0}
      WEB_PORT: ${WEB_PORT:-8000}
      LANGUAGE_CODE: ${LANGUAGE_CODE:-en-en}
      TZ: ${TZ:-UTC}
      POSTGRES_DB: ${POSTGRES_DB:-xstandard}
      POSTGRES_USER: ${POSTGRES_USER:-xstandard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST:-xstandardanwendung-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432} 
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: xstandardanwendung-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xstandard}
      POSTGRES_USER: ${POSTGRES_USER:-xstandard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xstandard} -d ${POSTGRES_DB:-xstandard}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data: