services:
  web:
    container_name: xstandardanwendung
    image: choosenmeme/xstandardanwendung:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:${WEB_PORT:-8000}"
    environment:
      DEBUG: ${DEBUG:-0}
      SECRET_KEY: ${SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      WEB_HOST: ${WEB_HOST:-0.0.0.0}
      WEB_PORT: ${WEB_PORT:-8000}
      APP_PATH: ${APP_PATH:-}
      LANGUAGE_CODE: ${LANGUAGE_CODE:-en-en}
      TZ: ${TZ:-UTC}
      # SQLite-DB ausserhalb von /app, damit sie im Volume persistiert.
      SQLITE_PATH: /data/db.sqlite3
    volumes:
      - ./app/db.sqlite3:/data/db.sqlite3
