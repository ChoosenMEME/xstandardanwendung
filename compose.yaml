services:
  web:
    container_name: xstandardanwendung
    build:
      context: .
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    environment:
      DEBUG: ${DEBUG:-1}
      SECRET_KEY: ${SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      UID: ${UID:-1000}
      GID: ${GID:-1000}
      LANGUAGE_CODE: ${LANGUAGE_CODE:-en-en}
      TZ: ${TZ:-UTC}
      POSTGRES_DB: ${POSTGRES_DB:-xstandard}
      POSTGRES_USER: ${POSTGRES_USER:-xstandard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST:-xstandardanwendung-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432} 
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: xstandardanwendung-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xstandard}
      POSTGRES_USER: ${POSTGRES_USER:-xstandard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xstandard} -d ${POSTGRES_DB:-xstandard}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data: